{# Reusable image placeholder: ratio 43 | 11 (1:1 for listing card thumbs). #}
<div class="ui-image-placeholder ui-image-placeholder--{{ ratio|default:'43' }}"{% if alt_text %} aria-label="{{ alt_text }}"{% else %} aria-hidden="true"{% endif %}>
  <span class="ui-image-placeholder__icon" aria-hidden="true"><i class="fa-regular fa-image"></i></span>
  {% if text %}<span class="ui-image-placeholder__text">{{ text }}</span>{% endif %}
</div>
