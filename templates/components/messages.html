{% if messages %}
  <div class="auth-messages" role="region" aria-label="Avisos" aria-live="polite">
    {% for message in messages %}
      <p
        class="auth-message auth-message--{{ message.tags|default:'info' }}"
        {% if message.tags == 'error' %}role="alert" aria-live="assertive"{% endif %}
      >{{ message }}</p>
    {% endfor %}
  </div>
{% endif %}
