{# Componente reutilizable: buscador de anuncios (GET) #}
<div class="search-bar" aria-label="Buscador principal">
  <div class="search-bar__panel" aria-label="Búsqueda de anuncios">
    <form class="search-bar__form" action="{% url 'browse' %}" method="get" role="search">
      <div class="search-bar__field search-bar__field--q">
        <label class="search-bar__label" for="search-q">¿Qué estás buscando?</label>
        <input
          class="form-control"
          id="search-q"
          name="q"
          type="search"
          inputmode="search"
          placeholder="¿Qué estás buscando?"
          value="{{ request.GET.q|default:'' }}"
          autocomplete="off"
        >
      </div>

      <div class="search-bar__actions">
        <button class="button btn-primary search-bar__submit" type="submit" data-event="search_submit" data-event-detail="hero">
          Buscar
        </button>
      </div>
    </form>
  </div>

  {% if quick_search_categories %}
    <div class="search-bar__quick" aria-label="Categorías rápidas">
      <span class="search-bar__quick-title">Explora rápido</span>
      <div class="search-bar__quick-list">
        {% for category in quick_search_categories %}
          <a
            class="search-bar__quick-chip"
            href="{{ category.get_absolute_url }}"
            data-event="category_click"
            data-event-detail="{{ category.slug }}"
          >
            <span class="search-bar__quick-icon" aria-hidden="true">
              {% if category.icon %}
                <i class="{{ category.icon }}"></i>
              {% else %}
                <i class="fa-solid fa-tag"></i>
              {% endif %}
            </span>
            <span>{{ category.name }}</span>
          </a>
        {% endfor %}
      </div>
    </div>
  {% endif %}
</div>
