{# Filtros GET hogar: /anuncios/?category=hogar o hub /hogar/ #}
<form
  class="browse-filter-form browse-filter-form--sidebar"
  method="get"
  action="{{ home_filters_form_action }}"
  aria-label="Filtrar anuncios de hogar"
>
  {% if home_filters_include_category %}
    <input type="hidden" name="category" value="hogar">
  {% endif %}
  {% if request.GET.q %}
    <input type="hidden" name="q" value="{{ request.GET.q }}">
  {% endif %}
  <aside class="browse-filters-sidebar">
    <details class="browse-filters-accordion" open>
      <summary class="browse-filters-summary">Filtrar hogar</summary>
      <div class="browse-filters-inner">
        {% include "listings/partials/browse_location_filter.html" with location_filter_id="id_browse_area_home" %}
        <div class="form-group">
          <label for="id_browse_home_item_type">Tipo de artículo</label>
          <select
            class="form-control"
            name="item_type"
            id="id_browse_home_item_type"
            hx-get="{% url 'homegoods_brand_options' %}"
            hx-target="#id_browse_home_brand"
            hx-swap="innerHTML"
            hx-trigger="change"
            onchange="document.getElementById('id_browse_home_model').innerHTML='<option value=&quot;&quot;>Todos los modelos</option>';"
          >
            <option value="">Todos</option>
            {% for val, label in home_item_type_choices %}
              <option value="{{ val }}" {% if request.GET.item_type == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label for="id_browse_home_condition">Condición</label>
          <select class="form-control" name="condition" id="id_browse_home_condition">
            <option value="">Todas</option>
            {% for val, label in home_condition_choices %}
              <option value="{{ val }}" {% if request.GET.condition == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label for="id_browse_home_brand">Marca</label>
          <select
            class="form-control"
            name="brand"
            id="id_browse_home_brand"
            hx-get="{% url 'homegoods_model_options' %}"
            hx-target="#id_browse_home_model"
            hx-include="#id_browse_home_item_type"
            hx-swap="innerHTML"
            hx-trigger="change"
          >
            <option value="">Todas las marcas</option>
            {% for brand in home_browse_brands %}
              <option value="{{ brand.pk }}" {% if home_filter_params.brand_id == brand.pk %}selected{% endif %}>{{ brand.name }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label for="id_browse_home_model">Modelo</label>
          <select
            class="form-control"
            name="model"
            id="id_browse_home_model"
          >
            <option value="">Todos los modelos</option>
            {% for pk, name in home_browse_model_choices %}
              <option value="{{ pk }}" {% if home_filter_params.model_id == pk %}selected{% endif %}>{{ name }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group browse-filter-row">
          <div>
            <label for="id_browse_home_price_from">Precio desde (USD)</label>
            <input
              class="form-control browse-filter-input--compact"
              type="text"
              name="price_from"
              id="id_browse_home_price_from"
              inputmode="numeric"
              pattern="[0-9]*"
              data-digits-only="true"
              placeholder="20"
              value="{{ request.GET.price_from|default:'' }}"
              autocomplete="off"
            >
          </div>
          <div>
            <label for="id_browse_home_price_to">Precio hasta (USD)</label>
            <input
              class="form-control browse-filter-input--compact"
              type="text"
              name="price_to"
              id="id_browse_home_price_to"
              inputmode="numeric"
              pattern="[0-9]*"
              data-digits-only="true"
              placeholder="800"
              value="{{ request.GET.price_to|default:'' }}"
              autocomplete="off"
            >
          </div>
        </div>

        <div class="browse-filter-actions">
          <button type="submit" class="button btn-primary">Aplicar filtros</button>
          <a class="button btn-secondary" href="{{ filter_clear_url }}">Limpiar</a>
        </div>
      </div>
    </details>
  </aside>
</form>
