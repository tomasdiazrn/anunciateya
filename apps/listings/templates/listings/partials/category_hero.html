{% if hero_title %}
<section class="category-hero" aria-labelledby="category-hero-heading">
  <div class="container">
    <div class="category-hero__banner">
      <div class="category-hero__copy">
        <h1 id="category-hero-heading" class="category-hero__title">{{ hero_title }}</h1>
        {% if hero_subtitle %}
          <p class="category-hero__subtitle">{{ hero_subtitle }}</p>
        {% endif %}
        <a
          class="button btn-primary category-hero__cta"
          href="{% url 'publish_in_category' category.slug %}"
          data-event="create_listing"
          data-event-detail="category_hero_inline"
        >
          {{ hero_cta_label|default:"Publicar anuncio" }}
          <i class="fa-solid fa-arrow-right-long" aria-hidden="true"></i>
        </a>
      </div>
      <div class="category-hero__visual" aria-hidden="true">
        {% if category.icon %}
          <i class="{{ category.icon }}"></i>
        {% else %}
          <i class="fa-solid fa-layer-group"></i>
        {% endif %}
      </div>
    </div>
  </div>
</section>
{% endif %}
