{# Sidebar (WordPress-like): publicación + acciones. Expects: form, submit_label, optional listing, optional cancel_url #}
<aside class="listing-editor__side" aria-label="Opciones de publicación">
  <div class="listing-editor__side-inner">
    <section class="card listing-editor__side-card" aria-labelledby="publish-box-title">
      <h2 id="publish-box-title" class="h-section listing-editor__side-title">Publicación</h2>
      {% if form.publish_state %}
        {% include "components/ui/form_field.html" with field=form.publish_state %}
      {% endif %}

      <div class="listing-editor__actions">
        <p class="small muted listing-editor__draft-note" id="listing-draft-note" hidden>Borrador guardado automáticamente</p>
        <button type="submit" class="button btn-primary listing-editor__submit" data-loading-text="Guardando...">{{ submit_label }}</button>
        <a
          class="button btn-secondary"
          href="{% if cancel_url %}{{ cancel_url }}{% elif listing %}{{ listing.get_absolute_url }}{% else %}{% url 'publish' %}{% endif %}"
          {% if cancel_hx_target %}
            hx-get="{% if cancel_url %}{{ cancel_url }}{% elif listing %}{{ listing.get_absolute_url }}{% else %}{% url 'publish' %}{% endif %}"
            hx-target="{{ cancel_hx_target }}"
            hx-swap="innerHTML"
            hx-push-url="true"
          {% endif %}
        >Cancelar</a>
      </div>
    </section>
  </div>
</aside>
