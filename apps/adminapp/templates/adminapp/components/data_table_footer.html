<div class="admin-data-table__footer">
  <span class="admin-data-table__count">{{ page_obj.paginator.count }} {{ item_label|default:"items" }}</span>

  {% if page_obj.has_other_pages %}
    <nav class="admin-pagination admin-pagination--in-table" aria-label="Paginación">
      <span class="admin-pagination__status">Página {{ page_obj.number }} de {{ page_obj.paginator.num_pages }}</span>
      <div class="admin-pagination__links">
        {% if page_obj.has_previous %}
          <a
            class="admin-pagination__link"
            href="{{ page_base_url }}?page={{ page_obj.previous_page_number }}{% if filters_qs %}&{{ filters_qs }}{% endif %}"
            hx-get="{{ page_base_url }}?page={{ page_obj.previous_page_number }}{% if filters_qs %}&{{ filters_qs }}{% endif %}"
            hx-target="#admin-main-content"
            hx-push-url="true"
            hx-swap="innerHTML"
            hx-indicator="#admin-loading"
          >Anterior</a>
        {% endif %}

        {% if page_obj.has_next %}
          <a
            class="admin-pagination__link"
            href="{{ page_base_url }}?page={{ page_obj.next_page_number }}{% if filters_qs %}&{{ filters_qs }}{% endif %}"
            hx-get="{{ page_base_url }}?page={{ page_obj.next_page_number }}{% if filters_qs %}&{{ filters_qs }}{% endif %}"
            hx-target="#admin-main-content"
            hx-push-url="true"
            hx-swap="innerHTML"
            hx-indicator="#admin-loading"
          >Siguiente</a>
        {% endif %}
      </div>
    </nav>
  {% endif %}
</div>
