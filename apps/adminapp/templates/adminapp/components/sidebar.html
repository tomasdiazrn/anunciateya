{% load static %}
{# Navegación: enlaces HTMX al área #admin-main-content #}
<aside class="admin-layout__sidebar admin-sidebar" id="admin-sidebar" aria-label="Navegación de administración">
  <div class="admin-sidebar__header">
    <a class="admin-sidebar__brand" href="{% url 'adminapp:dashboard' %}">
      <img
        class="admin-sidebar__logo"
        src="{% static brand_logo_white %}"
        alt=""
        decoding="async"
      >
    </a>
    <button
      type="button"
      class="admin-sidebar__collapse"
      data-admin-sidebar-collapse
      aria-expanded="true"
      aria-controls="admin-sidebar"
      aria-label="Cerrar menú lateral"
    >
      <span class="admin-sidebar__collapse-icon--open" aria-hidden="true">⟨</span>
      <span class="admin-sidebar__collapse-icon--closed" aria-hidden="true">⟩</span>
    </button>
  </div>

  <nav class="admin-sidebar__nav" id="admin-sidebar-nav" aria-label="Secciones">
    <div class="admin-nav">
      <a
        href="{% url 'adminapp:dashboard' %}"
        class="admin-nav__link{% if admin_section == 'dashboard' %} is-active{% endif %}"
        data-admin-nav-link
        hx-get="{% url 'adminapp:dashboard' %}"
        hx-target="#admin-main-content"
        hx-push-url="true"
        hx-swap="innerHTML"
        hx-indicator="#admin-loading"
      >
        <span class="admin-nav__label">Dashboard</span>
      </a>
      <a
        href="{% url 'adminapp:listings' %}"
        class="admin-nav__link{% if admin_section == 'listings' %} is-active{% endif %}"
        data-admin-nav-link
        hx-get="{% url 'adminapp:listings' %}"
        hx-target="#admin-main-content"
        hx-push-url="true"
        hx-swap="innerHTML"
        hx-indicator="#admin-loading"
      >
        <span class="admin-nav__label">Anuncios</span>
      </a>
      <a
        href="{% url 'adminapp:users' %}"
        class="admin-nav__link{% if admin_section == 'users' %} is-active{% endif %}"
        data-admin-nav-link
        hx-get="{% url 'adminapp:users' %}"
        hx-target="#admin-main-content"
        hx-push-url="true"
        hx-swap="innerHTML"
        hx-indicator="#admin-loading"
      >
        <span class="admin-nav__label">Usuarios</span>
      </a>
      <a
        href="{% url 'adminapp:newsletter_subscribers' %}"
        class="admin-nav__link{% if admin_section == 'newsletter' %} is-active{% endif %}"
        data-admin-nav-link
        hx-get="{% url 'adminapp:newsletter_subscribers' %}"
        hx-target="#admin-main-content"
        hx-push-url="true"
        hx-swap="innerHTML"
        hx-indicator="#admin-loading"
      >
        <span class="admin-nav__label">Newsletter</span>
      </a>

      <a
        href="{% url 'adminapp:hosting' %}"
        class="admin-nav__link{% if admin_section == 'hosting' %} is-active{% endif %}"
        data-admin-nav-link
        hx-get="{% url 'adminapp:hosting' %}"
        hx-target="#admin-main-content"
        hx-push-url="true"
        hx-swap="innerHTML"
        hx-indicator="#admin-loading"
      >
        <span class="admin-nav__label">Hosting</span>
      </a>
    </div>
  </nav>

  <div class="admin-sidebar__footer">
    <form method="post" action="{% url 'adminapp:logout' %}">
      {% csrf_token %}
      <button type="submit" class="admin-nav__link" title="Cerrar sesión">
        <i class="admin-nav__icon fa-solid fa-right-from-bracket" aria-hidden="true"></i>
        <span class="admin-nav__label">Cerrar sesión</span>
      </button>
    </form>
  </div>
</aside>
