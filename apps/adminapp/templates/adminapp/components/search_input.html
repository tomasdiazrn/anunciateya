{# name, placeholder, value (opcional), input_id (opcional) #}
<div class="admin-search">
  <input
    class="admin-search__input"
    type="search"
    name="{{ name|default:'q' }}"
    placeholder="{{ placeholder|default:'Buscar…' }}"
    value="{{ value|default:'' }}"
    autocomplete="off"
    {% if input_id %}id="{{ input_id }}"{% endif %}
  >
</div>
