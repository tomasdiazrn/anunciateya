{# label; variant; url; type (submit|button); hx_post, hx_get, hx_target, hx_swap, hx_push_url, hx_indicator (opcional HTMX) #}
{% if hx_post %}
  <button
    type="button"
    class="admin-btn admin-btn--{{ variant|default:'secondary' }}"
    hx-post="{{ hx_post }}"
    hx-target="{{ hx_target|default:'closest tr' }}"
    hx-swap="{{ hx_swap|default:'outerHTML' }}"
    {% if hx_indicator %}hx-indicator="{{ hx_indicator }}"{% endif %}
  >{{ label }}</button>
{% elif hx_get %}
  <a
    href="{{ url|default:'#' }}"
    class="admin-btn admin-btn--{{ variant|default:'secondary' }}"
    hx-get="{{ hx_get }}"
    hx-target="{{ hx_target|default:'#admin-main-content' }}"
    hx-swap="{{ hx_swap|default:'innerHTML' }}"
    {% if hx_push_url %}hx-push-url="true"{% endif %}
    {% if hx_indicator %}hx-indicator="{{ hx_indicator }}"{% endif %}
  >{{ label }}</a>
{% elif url %}
  <a class="admin-btn admin-btn--{{ variant|default:'secondary' }}" href="{{ url }}">{{ label }}</a>
{% else %}
  <button type="{{ type|default:'button' }}" class="admin-btn admin-btn--{{ variant|default:'secondary' }}">{{ label }}</button>
{% endif %}
