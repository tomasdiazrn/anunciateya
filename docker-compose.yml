services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-webmarketplace}
      POSTGRES_USER: ${POSTGRES_USER:-webmarketplace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-webmarketplace}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    expose:
      - "8000"
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-webmarketplace}
      POSTGRES_USER: ${POSTGRES_USER:-webmarketplace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-webmarketplace}
      SECRET_KEY: ${SECRET_KEY:-local-docker-compose-only-replace-in-production-50chars!!}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,nginx}
      SITE_URL: ${SITE_URL:-http://localhost}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-false}
      LANDING_ONLY_ENABLED: ${LANDING_ONLY_ENABLED:-true}
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.26-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
    depends_on:
      - web

volumes:
  pgdata:
  static_volume:
  media_volume:
